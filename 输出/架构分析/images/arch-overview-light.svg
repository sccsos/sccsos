  <!-- Cross-layer arrows -->
  <path d="M 110 448 L 110 468" stroke="#475569" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <path d="M 855 448 L 855 468" stroke="#475569" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

