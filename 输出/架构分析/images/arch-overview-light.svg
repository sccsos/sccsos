  <rect x="45" y="125" width="120" height="44" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="144" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" font-weight="bold" fill="#065f46">数据库</text>
  <text x="105" y="158" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="7" fill="#047857">SQLite/PostgreSQL</text>

  <rect x="180" y="125" width="120" height="44" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="240" y="144" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" font-weight="bold" fill="#065f46">AgentRegistry</text>
  <text x="240" y="158" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="7" fill="#047857">YAML 定义管理</text>

  <rect x="315" y="125" width="120" height="44" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="375" y="144" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" font-weight="bold" fill="#065f46">HermesAdapter</text>
  <text x="375" y="158" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="7" fill="#047857">4 种适配模式</text>

  <rect x="450" y="125" width="120" height="44" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="510" y="144" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" font-weight="bold" fill="#065f46">LifecycleManager</text>
  <text x="510" y="158" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="7" fill="#047857">5 状态状态机</text>

  <rect x="585" y="125" width="120" height="44" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="645" y="144" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" font-weight="bold" fill="#065f46">AgentRunner</text>
  <text x="645" y="158" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="7" fill="#047857">后台线程管理</text>

  <rect x="720" y="125" width="100" height="44" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
