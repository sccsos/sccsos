  <text x="835" y="363" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="7" fill="#0284c7">3 层计费 + CSV</text>

  <rect x="45" y="383" width="240" height="34" rx="6" fill="#f0f9ff" stroke="#0284c7" stroke-width="1" stroke-dasharray="3,2"/>
