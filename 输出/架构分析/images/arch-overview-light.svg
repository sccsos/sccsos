  <rect x="700" y="715" width="90" height="32" rx="5" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="745" y="735" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="8" font-weight="bold" fill="#d97706">K8s / HPA</text>

