<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 800" width="960" height="800">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e11d48"/>
    </marker>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="800" fill="url(#bg-grad)" rx="8"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="16" font-weight="bold" fill="#0f172a">SCCS OS 三层子运行时架构总览</text>
  <text x="480" y="54" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="10" fill="#64748b">v0.15.0 — 智能体操作系统平台</text>

  <!-- Legend -->
  <rect x="30" y="62" width="900" height="28" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="40" y="70" width="14" height="14" rx="2" fill="#d1fae5"/>
  <text x="58" y="81" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#475569">核心运行时</text>
  <rect x="155" y="70" width="14" height="14" rx="2" fill="#e0f2fe"/>
  <text x="173" y="81" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#475569">可观测性</text>
  <rect x="270" y="70" width="14" height="14" rx="2" fill="#ede9fe"/>
  <text x="288" y="81" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#475569">工作流编排</text>
  <rect x="385" y="70" width="14" height="14" rx="2" fill="#ffe4e6"/>
  <text x="403" y="81" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#475569">安全</text>
  <rect x="460" y="70" width="14" height="14" rx="2" fill="#fef3c7"/>
  <text x="478" y="81" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#475569">基础设施</text>
  <line x1="560" y1="76" x2="600" y2="76" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="608" y="81" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#475569">数据流</text>
  <line x1="670" y1="76" x2="700" y2="76" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-dashed)"/>
  <text x="708" y="81" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#475569">安全控制流</text>

  <!-- ── Layer 1: RuntimeCore ── -->
