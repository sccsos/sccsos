  <path d="M 800 170 L 800 688" stroke="#e11d48" stroke-width="1.2" stroke-dasharray="4,3" fill="none"/>

  <!-- Labels -->
  <text x="24" y="795" font-family="'Microsoft YaHei',sans-serif" font-size="8" fill="#94a3b8">SCCS OS v0.15.0 | 健康评分 9.2/10 | 1021 测试用例 | 50+ 功能模块</text>
