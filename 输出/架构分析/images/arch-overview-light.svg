  <text x="200" y="735" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="8" font-weight="bold" fill="#e11d48">策略引擎</text>

  <rect x="255" y="715" width="90" height="32" rx="5" fill="#ffe4e6" stroke="#fb7185" stroke-width="1"/>
  <text x="300" y="735" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="8" font-weight="bold" fill="#e11d48">注入防护</text>

  <rect x="355" y="715" width="90" height="32" rx="5" fill="#ffe4e6" stroke="#fb7185" stroke-width="1"/>
  <text x="400" y="735" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="8" font-weight="bold" fill="#e11d48">速率限制</text>

  <rect x="455" y="715" width="90" height="32" rx="5" fill="#ffe4e6" stroke="#fb7185" stroke-width="1"/>
  <text x="500" y="735" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="8" font-weight="bold" fill="#e11d48">RBAC</text>

