  <text x="600" y="540" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="7" fill="#7c3aed">角色 / 人格加载</text>

  <rect x="685" y="500" width="130" height="50" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="522" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" font-weight="bold" fill="#6d28d9">AgentMsgBus</text>
  <text x="750" y="540" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="7" fill="#7c3aed">Agent 间通信</text>

  <rect x="45" y="562" width="255" height="34" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="172" y="583" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="8" fill="#6d28d9">ContextBuilder(Jinja2) + RetryPolicy + 模板引擎</text>

