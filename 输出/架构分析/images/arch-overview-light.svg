  <text x="290" y="540" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="7" fill="#7c3aed">条件分支 + 重试</text>

  <rect x="375" y="500" width="140" height="50" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
