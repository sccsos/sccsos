  <text x="650" y="213" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="7" fill="#047857">会话生命期</text>

  <!-- Arrow: core → obs -->
  <path d="M 480 278 L 480 295" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

