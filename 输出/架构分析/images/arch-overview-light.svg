  <rect x="30" y="658" width="900" height="130" rx="6" fill="none" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="45" y="675" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#e11d48">安全 &amp; 基础设施层</text>

