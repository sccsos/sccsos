  <rect x="30" y="303" width="900" height="145" rx="6" fill="#e0f2fe" fill-opacity="0.25" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="45" y="320" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#0284c7">② ObservabilityRuntime — 可观测子系统</text>

