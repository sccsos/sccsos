  <text x="770" y="158" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="7" fill="#047857">心跳守护</text>

  <rect x="45" y="180" width="160" height="40" rx="6" fill="#d1fae5" fill-opacity="0.6" stroke="#059669" stroke-width="1" stroke-dasharray="3,2" filter="url(#shadow)"/>
  <text x="125" y="200" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" font-weight="bold" fill="#065f46">MemoryStore</text>
  <text x="125" y="213" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="7" fill="#047857">持久 KV + TTL</text>

  <rect x="220" y="180" width="160" height="40" rx="6" fill="#d1fae5" fill-opacity="0.6" stroke="#059669" stroke-width="1" stroke-dasharray="3,2" filter="url(#shadow)"/>
  <text x="300" y="200" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" font-weight="bold" fill="#065f46">KnowledgeBase</text>
  <text x="300" y="213" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="7" fill="#047857">冷记忆 / 向量检索</text>

  <rect x="395" y="180" width="160" height="40" rx="6" fill="#d1fae5" fill-opacity="0.6" stroke="#059669" stroke-width="1" stroke-dasharray="3,2" filter="url(#shadow)"/>
  <text x="475" y="200" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" font-weight="bold" fill="#065f46">ModelRouter</text>
  <text x="475" y="213" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="7" fill="#047857">模型池调度</text>

