name: 条件分支示例
description: 根据需求明确度选择不同处理路径
schema_version: '1.1'
parallel_groups: []

steps:
  - id: clarity-check
    name: 需求明确度评估
    agent: architect
    prompt: |
      评估以下需求的明确程度：
      {{ steps.input.context }}
      如果需求包含具体的功能描述、用户场景或技术指标，回复"明确"。
      否则回复"不够明确"。

  - id: deep-design
    name: 深度设计
    agent: architect
    condition: "{{ '明确' in steps.clarity_check.response }}"
    prompt: |
      需求已明确，执行完整架构设计：
      {{ steps.input.context }}
      请输出详细设计方案。

  - id: clarify-suggest
    name: 澄清建议
    agent: architect
    condition: "{{ '明确' not in steps.clarity_check.response }}"
    prompt: |
      需求不够明确，请给出需求澄清建议：
      {{ steps.input.context }}
      列出需要补充的信息和典型的"5W1H"引导问题。
