name: 并行检索
description: 多 Agent 并行信息检索与综合
schema_version: '1.1'
parallel_groups:
  - id: search
    max_concurrent: 3
    steps:
      - search-tech
      - search-market
      - search-security

steps:
  - id: search-tech
    name: 技术方案检索
    agent: architect
    prompt: |
      针对以下需求，调研可用的技术方案：
      {{ steps.input.context }}
      列出 2-3 个主流方案并对比优劣。

  - id: search-market
    name: 市场趋势分析
    agent: doc-writer
    prompt: |
      针对以下需求领域，分析当前市场趋势：
      {{ steps.input.context }}
      关注：主流厂商、开源生态、行业标准。

  - id: search-security
    name: 安全合规分析
    agent: code-reviewer
    prompt: |
      分析以下需求涉及的安全和合规考量：
      {{ steps.input.context }}
      列出：安全风险、合规要求、数据隐私。

  - id: synthesize
    name: 综合报告
    agent: architect
    prompt: |
      综合以下多维度调研结果，输出最终建议报告。
      技术方案：{{ steps.search_tech.response }}
      市场趋势：{{ steps.search_market.response }}
      安全合规：{{ steps.search_security.response }}
