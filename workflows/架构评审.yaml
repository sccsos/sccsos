name: 架构评审
description: 多角度架构设计方案评审 — 支持需求输入
schema_version: '1.1'
parallel_groups:
  - id: review
    max_concurrent: 3
    steps:
      - doc-review
      - code-review
      - final-review

steps:
  - id: analysis
    name: 需求分析
    agent: architect
    prompt: |
      分析以下需求，提炼出功能需求和非功能需求：

      {{ steps.input.context }}

      请输出结构化的需求分析报告。

  - id: design
    name: 架构设计
    agent: architect
    input: analysis.response
    prompt: |
      基于需求分析结果设计系统架构方案。
      需求分析：{{ steps.analysis.response }}
      请包含：模块划分、组件设计、数据流、技术选型。

  - id: doc-review
    name: 文档评审
    agent: doc-writer
    condition: "{{ steps.design.response | length > 0 }}"
    prompt: |
      评审以下架构设计文档的完整性和清晰度：
      {{ steps.design.response }}
      请给出文档改进建议。

  - id: code-review
    name: 代码审查
    agent: code-reviewer
    condition: "{{ steps.design.response | length > 0 }}"
    prompt: |
      从代码实现角度评审以下架构设计：
      {{ steps.design.response }}
      请关注可测试性、API 设计质量和实现复杂度。

  - id: final-review
    name: 评审总结
    agent: architect
    condition: "{{ steps.design.response | length > 0 }}"
    prompt: |
      综合所有评审意见，输出最终架构评审报告。
      原始设计：{{ steps.design.response }}
      文档意见：{{ steps.doc_review.response }}
      代码意见：{{ steps.code_review.response }}
