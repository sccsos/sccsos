name: 冒烟测试
description: 快速验证 Agent 环境和工作流引擎是否正常运行
schema_version: '1.1'
parallel_groups: []

steps:
  - id: ping
    name: 连通性测试
    agent: architect
    prompt: |
      请回复以下确认信息，仅返回 JSON 格式：

      {"status": "ok", "agent": "architect", "version": "0.11.4", "message": "Hermes agent is reachable"}

  - id: info
    name: 环境信息
    agent: architect
    prompt: |
      请用 JSON 格式回复当前环境信息，包含：python版本、操作系统、当前工作目录。
