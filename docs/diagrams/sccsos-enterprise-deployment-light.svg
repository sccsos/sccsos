<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 820" width="1060" height="820" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">

<defs>
  <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="8 3, 0 0, 0 6" fill="#1e3a8a"/></marker>
  <marker id="arr-rose" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="8 3, 0 0, 0 6" fill="#e11d48"/></marker>
  <marker id="arr-slate" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="8 3, 0 0, 0 6" fill="#334155"/></marker>
  <filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/></filter>
</defs>

<!-- Background -->
<rect width="100%" height="100%" fill="#ffffff"/>

<!-- Title -->
<text x="530" y="28" fill="#0f172a" font-size="14" font-weight="700" text-anchor="middle">SCCS OS 集群全量企业级部署架构全景</text>
<text x="530" y="44" fill="#64748b" font-size="9" text-anchor="middle">Kubernetes · PostgreSQL · Kafka · OTel · Prometheus · Grafana</text>

<!-- ===== Layer 1: User + Ingress ===== -->
<rect x="30" y="60" width="1000" height="90" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
<text x="46" y="76" fill="#334155" font-size="9" font-weight="600">流量入口层</text>

<!-- Users -->
<rect x="180" y="68" width="140" height="40" rx="20" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5" filter="url(#shadow)"/>
<text x="250" y="93" fill="#0c4a6e" font-size="12" font-weight="600" text-anchor="middle">👥 用户流量</text>

<!-- Ingress -->
<rect x="440" y="68" width="200" height="40" rx="6" fill="#f1f5f9" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
<text x="540" y="86" fill="#0f172a" font-size="10" font-weight="600" text-anchor="middle">Ingress Controller</text>
<text x="540" y="100" fill="#64748b" font-size="8" text-anchor="middle">TLS 终止 · 域名路由</text>

<!-- TLS -->
<rect x="720" y="68" width="160" height="40" rx="6" fill="#fef2f2" stroke="#e11d48" stroke-width="1.5" filter="url(#shadow)"/>
<text x="800" y="86" fill="#7f1d1d" font-size="10" font-weight="600" text-anchor="middle">Cert-Manager</text>
<text x="800" y="100" fill="#64748b" font-size="8" text-anchor="middle">Let's Encrypt TLS</text>

<line x1="320" y1="88" x2="440" y2="88" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-blue)"/>
<line x1="640" y1="88" x2="720" y2="88" stroke="#1e3a8a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>

<!-- ===== Layer 2: SCCS OS Cluster ===== -->
<rect x="30" y="165" width="1000" height="145" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="46" y="182" fill="#1e3a8a" font-size="9" font-weight="600">SCCS OS 集群层 (3~10 副本)</text>

<!-- Pods -->
<rect x="80" y="195" width="160" height="70" rx="6" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5" filter="url(#shadow)"/>
<text x="160" y="217" fill="#1e3a8a" font-size="10" font-weight="600" text-anchor="middle">FastAPI Pod 1</text>
<text x="160" y="233" fill="#475569" font-size="8" text-anchor="middle">Workflow Engine</text>
<text x="160" y="247" fill="#475569" font-size="8" text-anchor="middle">Agent Runtime</text>
<text x="160" y="260" fill="#64748b" font-size="7" text-anchor="middle">健康检查 / 告警</text>

<rect x="270" y="195" width="160" height="70" rx="6" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5" filter="url(#shadow)"/>
<text x="350" y="217" fill="#1e3a8a" font-size="10" font-weight="600" text-anchor="middle">FastAPI Pod 2</text>
<text x="350" y="233" fill="#475569" font-size="8" text-anchor="middle">Workflow Engine</text>
<text x="350" y="247" fill="#475569" font-size="8" text-anchor="middle">Agent Runtime</text>
<text x="350" y="260" fill="#64748b" font-size="7" text-anchor="middle">健康检查 / 告警</text>

<rect x="460" y="195" width="160" height="70" rx="6" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5" filter="url(#shadow)"/>
<text x="540" y="217" fill="#1e3a8a" font-size="10" font-weight="600" text-anchor="middle">FastAPI Pod N</text>
<text x="540" y="233" fill="#475569" font-size="8" text-anchor="middle">Workflow Engine</text>
<text x="540" y="247" fill="#475569" font-size="8" text-anchor="middle">Agent Runtime</text>
<text x="540" y="260" fill="#64748b" font-size="7" text-anchor="middle">水平扩缩容 (HPA)</text>

<!-- HPA box -->
<rect x="700" y="195" width="200" height="40" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1" filter="url(#shadow)"/>
<text x="800" y="212" fill="#854d0e" font-size="10" font-weight="600" text-anchor="middle">HPA (CPU ≥ 70% 自动扩缩)</text>
<text x="800" y="226" fill="#64748b" font-size="8" text-anchor="middle">min: 3 / max: 10 副本</text>
<line x1="620" y1="230" x2="700" y2="215" stroke="#ca8a04" stroke-width="1" stroke-dasharray="4,3"/>

<!-- Arrows: Ingress to Pods -->
<line x1="540" y1="108" x2="540" y2="195" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-blue)"/>

<!-- ===== Layer 3: Middleware ===== -->
<rect x="30" y="325" width="1000" height="140" rx="6" fill="#f5f3ff" stroke="#eef2ff" stroke-width="1"/>
<text x="46" y="342" fill="#4c1d95" font-size="9" font-weight="600">中间件层</text>

<!-- Kafka -->
<rect x="80" y="350" width="220" height="55" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
<text x="190" y="370" fill="#4c1d95" font-size="10" font-weight="600" text-anchor="middle">Kafka 集群 (3 节点)</text>
<text x="190" y="386" fill="#475569" font-size="8" text-anchor="middle">跨实例 EventBus · 消息持久化</text>
<text x="190" y="398" fill="#64748b" font-size="7" text-anchor="middle">Topic: workflow.* / agent.* / skill.*</text>

<!-- PostgreSQL -->
<rect x="340" y="350" width="220" height="55" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
<text x="450" y="370" fill="#4c1d95" font-size="10" font-weight="600" text-anchor="middle">PostgreSQL (HA 主从)</text>
<text x="450" y="386" fill="#475569" font-size="8" text-anchor="middle">审计 · 计费 · Agent 状态</text>
<text x="450" y="398" fill="#64748b" font-size="7" text-anchor="middle">50Gi SSD · WAL 归档</text>

<!-- Redis -->
<rect x="600" y="350" width="200" height="55" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
<text x="700" y="370" fill="#4c1d95" font-size="10" font-weight="600" text-anchor="middle">Redis (哨兵模式)</text>
<text x="700" y="386" fill="#475569" font-size="8" text-anchor="middle">Session 共享 · 缓存</text>

<!-- OTel Collector -->
<rect x="840" y="350" width="150" height="55" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
<text x="915" y="370" fill="#4c1d95" font-size="10" font-weight="600" text-anchor="middle">OTel Collector</text>
<text x="915" y="386" fill="#475569" font-size="8" text-anchor="middle">指标 · 追踪 · 日志</text>
<text x="915" y="398" fill="#64748b" font-size="7" text-anchor="middle">DaemonSet</text>

<!-- Arrows: Pods → Middleware -->
<line x1="160" y1="265" x2="190" y2="350" stroke="#334155" stroke-width="1" marker-end="url(#arr-slate)"/>
<line x1="350" y1="265" x2="450" y2="350" stroke="#334155" stroke-width="1" marker-end="url(#arr-slate)"/>
<line x1="540" y1="265" x2="700" y2="350" stroke="#334155" stroke-width="1" marker-end="url(#arr-slate)"/>
<line x1="620" y1="265" x2="915" y2="350" stroke="#334155" stroke-width="1" marker-end="url(#arr-slate)"/>

<!-- ===== Layer 4: Observability ===== -->
<rect x="30" y="480" width="1000" height="120" rx="6" fill="#faf5ff" stroke="#f3e8ff" stroke-width="1"/>
<text x="46" y="497" fill="#6b21a8" font-size="9" font-weight="600">可观测性层</text>

<!-- Prometheus -->
<rect x="140" y="510" width="220" height="55" rx="6" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5" filter="url(#shadow)"/>
<text x="250" y="530" fill="#581c87" font-size="10" font-weight="600" text-anchor="middle">Prometheus Operator</text>
<text x="250" y="546" fill="#475569" font-size="8" text-anchor="middle">指标存储 · 告警规则</text>
<text x="250" y="558" fill="#64748b" font-size="7" text-anchor="middle">sccsos_* 指标 · 15s 采集间隔</text>

<!-- Grafana -->
<rect x="430" y="510" width="220" height="55" rx="6" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5" filter="url(#shadow)"/>
<text x="540" y="530" fill="#581c87" font-size="10" font-weight="600" text-anchor="middle">Grafana</text>
<text x="540" y="546" fill="#475569" font-size="8" text-anchor="middle">10 面板仪表盘 · 告警通知</text>
<text x="540" y="558" fill="#64748b" font-size="7" text-anchor="middle">Agent 状态 · Token 趋势 · 错误率</text>

<!-- Loki -->
<rect x="720" y="510" width="200" height="55" rx="6" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5" filter="url(#shadow)"/>
<text x="820" y="530" fill="#581c87" font-size="10" font-weight="600" text-anchor="middle">Loki (可选)</text>
<text x="820" y="546" fill="#475569" font-size="8" text-anchor="middle">JSON 日志聚合</text>
<text x="820" y="558" fill="#64748b" font-size="7" text-anchor="middle">90 天日志保留</text>

<!-- Arrows: OTel → Observability -->
<line x1="915" y1="405" x2="915" y2="480" stroke="#e11d48" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-rose)"/>
<line x1="915" y1="480" x2="250" y2="510" stroke="#e11d48" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-rose)"/>
<line x1="915" y1="480" x2="540" y2="510" stroke="#e11d48" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-rose)"/>
<line x1="915" y1="480" x2="820" y2="510" stroke="#e11d48" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-rose)"/>

<!-- ===== Legend ===== -->
<rect x="30" y="620" width="1000" height="55" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="46" y="638" fill="#475569" font-size="9" font-weight="600">图例</text>

<line x1="80" y1="650" x2="140" y2="650" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-blue)"/>
<text x="150" y="654" fill="#475569" font-size="8">数据流</text>

<line x1="230" y1="650" x2="290" y2="650" stroke="#e11d48" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-rose)"/>
<text x="300" y="654" fill="#475569" font-size="8">指标/追踪流</text>

<rect x="400" y="638" width="14" height="14" rx="4" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
<text x="422" y="650" fill="#475569" font-size="8">SCCS OS 组件</text>

<rect x="530" y="638" width="14" height="14" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text x="552" y="650" fill="#475569" font-size="8">中间件</text>

<rect x="630" y="638" width="14" height="14" rx="4" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
<text x="652" y="650" fill="#475569" font-size="8">可观测性</text>

<rect x="740" y="638" width="14" height="14" rx="4" fill="#fefce8" stroke="#ca8a04" stroke-width="1"/>
<text x="762" y="650" fill="#475569" font-size="8">HPA/自动管理</text>

<rect x="860" y="638" width="14" height="14" rx="20" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
<text x="882" y="650" fill="#475569" font-size="8">外部用户</text>

<!-- Footer -->
<text x="530" y="695" fill="#94a3b8" font-size="7" text-anchor="middle">创新研究院 李锋 · SCCS OS v0.14.2 · 2026-07</text>
</svg>
