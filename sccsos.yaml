agents:
  path: ./agents
  personalities_path: ./personalities
  wiki_path: ./wiki
database:
  path: ./data/sccsos.db
defaults:
  hermes_profile: sccsos
  max_turns: 90
  timeout: 1800
hermes:
  adapter: subprocess
  binary: hermes
  profile: sccsos
  setup:
    api_key: ''
    base_url: ''
    model: deepseek-v4-flash
    provider: deepseek
logging:
  directory: ./logs
  format: json
  level: INFO
  retention_days: 30
policies:
  default:
    allowed_commands:
    - hermes
    - git
    - ls
    - cat
    - head
    - tail
    - echo
    - python3
    - pip3
    - node
    - npm
    - which
    allowed_tools:
    - read_file
    - search_files
    - web_search
    - web_extract
    - terminal
    - delegate_task
    blocked_tools: []
    max_cost_usd: 5.0
    max_tokens_per_session: 100000
pricing:
  path: ./config/pricing.json
project:
  name: sccsos
  version: 0.14.2
tracing:
  enabled: true
  export_path: ./traces/
  otlp_endpoint: http://localhost:4318/v1/traces
webhooks:
  enabled: false
