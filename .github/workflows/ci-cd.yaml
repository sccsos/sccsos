# SCCS OS — CI/CD Pipeline
#
# Triggers:
#   - push/PR to main → test + lint + Docker build
#   - tag v*         → test + Docker build + Helm chart publish
#
# Secrets required:
#   DOCKER_USERNAME / DOCKER_PASSWORD — container registry auth
#   (or use GHCR which auto-authenticates via GITHUB_TOKEN)

name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: sccsos/sccsos
  HELM_CHART_DIR: deploy/helm/sccsos

jobs:
  # ── Test ─────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ env.PYTHON_VERSION }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 sccsos/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 sccsos/ --count --exit-zero --max-complexity=15 --max-line-length=100 --statistics

      - name: Run tests (excl. integration)
        run: |
          python -m pytest --override-ini='addopts=' \
            --ignore=tests/test_api_server.py \
            --ignore=tests/test_fastapi_server.py \
            --ignore=tests/test_event_bus_kafka_integration.py \
            --ignore=tests/test_postgres_integration.py \
            --ignore=tests/test_chroma_integration.py \
            -q

  # ── Docker Build (PR / main) ─────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker run --rm ${{ env.DOCKER_IMAGE }}:ci-${{ github.sha }} \
            python3 -c "import sccsos; print('SCCS OS', sccsos.__version__)" 2>/dev/null || \
          docker run --rm ${{ env.DOCKER_IMAGE }}:ci-${{ github.sha }} \
            sh -c "python3 -c \"import sccsos; print('SCCS OS', sccsos.__version__)\"" 2>/dev/null || \
          echo "Image built but version check deferred (non-default CMD)"

  # ── Release (tag v*) ─────────────────────────────────────────────
  release:
    name: Release (Docker + Helm)
    runs-on: ubuntu-latest
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Helm chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.VERSION }}/" ${{ env.HELM_CHART_DIR }}/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.VERSION }}\"/" ${{ env.HELM_CHART_DIR }}/Chart.yaml
          sed -i "s/^  tag:.*/  tag: \"${{ steps.version.outputs.VERSION }}\"/" ${{ env.HELM_CHART_DIR }}/values.yaml

      - name: Package Helm chart
        run: |
          helm package ${{ env.HELM_CHART_DIR }} --destination ./helm-repo

      - name: Upload Helm chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart-v${{ steps.version.outputs.VERSION }}
          path: ./helm-repo/*.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SCCS OS v${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          files: |
            ./helm-repo/*.tgz
          generate_release_notes: true
