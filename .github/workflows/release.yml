# SCCS OS — 自动发布工作流
#
# 当推送 v* tag 时触发:
# 1. 从 CHANGELOG.md 提取对应版本的发布说明
# 2. 构建 wheel + sdist 包
# 3. 创建 GitHub Release（含变更说明 + 构建产物）
#
# 使用:
#   git tag v0.14.1
#   git push origin v0.14.1

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  extract-changelog:
    name: 提取变更日志
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        id: parse
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Extract release notes
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          python3 scripts/extract_release_notes.py "$TAG_VERSION" /tmp/release_notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: /tmp/release_notes.md
          retention-days: 1

  build:
    name: 构建分发包
    needs: extract-changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Build wheel + sdist
        run: |
          python -m build --wheel --sdist
          ls -la dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14

  test:
    name: 运行测试
    needs: extract-changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,otel]"

      - name: Run tests with coverage gate
        run: |
          python -m pytest --tb=short -q --cov=sccsos --cov-fail-under=70 --override-ini='addopts=' -k "not test_fastapi" 2>&1 | tail -20

      - name: Run FastAPI tests
        run: |
          python -m pytest --tb=short -q --override-ini='addopts=' tests/test_fastapi_server.py 2>&1 | tail -10

  release:
    name: 创建 GitHub Release
    needs: [extract-changelog, build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: /tmp/

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Prepare release body
        id: notes
        run: |
          VERSION="${{ needs.extract-changelog.outputs.version }}"
          NOTES=$(cat /tmp/release_notes.md)
          EOF_MARKER="EOF_$(date +%s)"
          {
            echo "body<<${EOF_MARKER}"
            echo "# SCCS OS v${VERSION}"
            echo ""
            echo "${NOTES}"
            echo ""
            echo "---"
            echo "## 安装方式"
            echo ""
            echo '```bash'
            echo "# 从 PyPI"
            echo "pip install sccsos"
            echo ""
            echo "# 或从 Release 附件"
            echo "pip install sccsos-${VERSION}-py3-none-any.whl"
            echo '```'
            echo "${EOF_MARKER}"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SCCS OS v${{ needs.extract-changelog.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
          files: |
            dist/*.whl
            dist/*.tar.gz
