name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --cov=sccsos --cov-report=term-missing --cov-fail-under=70

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel --sdist

  k8s-integration:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: sccsos-test

      - name: Deploy SCCS OS to kind
        run: |
          kubectl apply -f deploy/k8s/00-namespace.yaml
          kubectl apply -f deploy/k8s/10-configmap.yaml
          kubectl apply -f deploy/k8s/20-pvc.yaml
          kubectl apply -f deploy/k8s/30-deployment.yaml
          kubectl apply -f deploy/k8s/40-service.yaml
          kubectl apply -f deploy/k8s/50-hpa.yaml
          kubectl rollout status deployment/sccsos -n sccsos --timeout=120s

      - name: Verify health endpoint
        run: |
          kubectl port-forward svc/sccsos -n sccsos 8765:8765 &
          sleep 3
          curl -s http://localhost:8765/api/v1/health | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('initialized')==True; print('Health OK')"

      - name: Cleanup
        run: |
          kind delete cluster --name sccsos-test
