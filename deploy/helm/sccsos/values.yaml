# SCCS OS Helm Chart Values
# Override these with: helm install sccsos ./deploy/helm/sccsos -f my-values.yaml

# ── Image ──────────────────────────────────────────────────────────
image:
  repository: sccsos
  tag: 0.14.2
  pullPolicy: IfNotPresent

# ── Service ────────────────────────────────────────────────────────
service:
  port: 8765
  type: ClusterIP

# ── Ingress ────────────────────────────────────────────────────────
ingress:
  enabled: false
  host: sccsos.example.com
  tls:
    enabled: false
    secretName: ""

# ── Resources ──────────────────────────────────────────────────────
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# ── Autoscaling (HPA) ──────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# ── Storage ────────────────────────────────────────────────────────
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

# ── SCCS OS Config ─────────────────────────────────────────────────
config:
  database:
    driver: sqlite
    path: /sccsos/data/sccsos.db
  logging:
    level: INFO
  tracing:
    enabled: true

# ── Environment ────────────────────────────────────────────────────
env:
  - name: HERMES_HOME
    value: /sccsos/hermes
  - name: SCCSOS_HOME
    value: /sccsos

# ── Webhook (optional) ─────────────────────────────────────────────
webhooks:
  enabled: false
  endpoints: []
