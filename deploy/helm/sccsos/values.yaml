# SCCS OS Helm Chart Values
# Override these with: helm install sccsos ./deploy/helm/sccsos -f my-values.yaml

# ── 部署模式 ─────────────────────────────────────────────────────────
# mode: 部署模式
#   "all-in-one"  (默认) — 单容器部署，SCCS OS + Hermes Agent 在同一镜像内
#   "slim+sidecar"       — 双容器部署，sccsos-slim + hermes-agent sidecar
mode: all-in-one

# ── Image ────────────────────────────────────────────────────────────
# 注: slim+sidecar 模式下，主容器使用 sccsos-slim:<slimTag>
image:
  repository: sccsos
  tag: 0.16.6
  slimTag: 0.16.6-slim
  pullPolicy: IfNotPresent

# ── Hermes Sidecar 镜像 (slim+sidecar 模式) ──────────────────────────
hermes:
  image:
    repository: sccsos-hermes
    tag: 0.16.6
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# ── Service ──────────────────────────────────────────────────────────
service:
  port: 8765
  type: ClusterIP

# ── Ingress ──────────────────────────────────────────────────────────
ingress:
  enabled: false
  host: sccsos.example.com
  tls:
    enabled: false
    secretName: ""

# ── SCCS OS Resources ────────────────────────────────────────────────
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# ── Autoscaling (HPA) ────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# ── Storage ──────────────────────────────────────────────────────────
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

# ── SCCS OS Config ───────────────────────────────────────────────────
config:
  database:
    driver: sqlite
    path: /sccsos/data/sccsos.db
  logging:
    level: INFO
  tracing:
    enabled: true

# ── Environment ──────────────────────────────────────────────────────
env:
  - name: HERMES_HOME
    value: /sccsos/hermes
  - name: HERMES_CODE_PATH
    value: /sccsos/hermes/hermes-agent
  - name: SCCSOS_HOME
    value: /sccsos

# ── Webhook (optional) ───────────────────────────────────────────────
webhooks:
  enabled: false
  endpoints: []
