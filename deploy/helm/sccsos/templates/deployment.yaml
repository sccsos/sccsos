apiVersion: apps/v1
kind: Deployment
metadata:
  name: sccsos
  namespace: {{ .Values.namespace | default "sccsos" }}
  labels:
    app.kubernetes.io/name: sccsos
    app.kubernetes.io/version: {{ .Values.image.tag | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sccsos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sccsos
    spec:
      securityContext:
        runAsUser: 1000
      containers:
        - name: sccsos
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /sccsos/sccsos.yaml
              subPath: sccsos.yaml
            - name: data
              mountPath: /sccsos/data
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
      volumes:
        - name: config
          configMap:
            name: sccsos-config
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: sccsos-data
          {{- else }}
          emptyDir: {}
          {{- end }}
