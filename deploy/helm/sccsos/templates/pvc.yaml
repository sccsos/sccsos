apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sccsos-data
  namespace: {{ .Values.namespace | default "sccsos" }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
