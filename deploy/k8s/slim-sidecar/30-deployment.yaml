apiVersion: apps/v1
kind: Deployment
metadata:
  name: sccsos
  namespace: sccsos
  labels:
    app.kubernetes.io/name: sccsos
    app.kubernetes.io/version: "0.16.5"
    sccsos.io/deployment-mode: slim+sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sccsos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sccsos
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8765"
    spec:
      # 共享 PID 命名空间：主容器可发现 sidecar 进程
      shareProcessNamespace: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        # ── 主容器：SCCS OS (slim 镜像) ──────────────────────────
        - name: sccsos
          image: sccsos:0.16.5-slim
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8765
              protocol: TCP
              name: http-api
          env:
            - name: SCCSOS_CONFIG
              value: /sccsos/config/sccsos.yaml
            - name: HERMES_ADAPTER
              value: docker-exec
            - name: HERMES_DOCKER_CONTAINER
              value: hermes-agent
          volumeMounts:
            - name: config
              mountPath: /sccsos/config
              readOnly: true
            - name: data
              mountPath: /sccsos/data
            - name: logs
              mountPath: /sccsos/logs
            - name: traces
              mountPath: /sccsos/traces
            - name: agents
              mountPath: /sccsos/agents
              readOnly: true
            - name: workflows
              mountPath: /sccsos/workflows
              readOnly: true
            - name: personalities
              mountPath: /sccsos/personalities
              readOnly: true
            - name: wiki
              mountPath: /sccsos/wiki
              readOnly: true
            # Docker socket 用于 docker exec 到 sidecar
            - name: dockersock
              mountPath: /var/run/docker.sock
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http-api
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http-api
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

        # ── Sidecar：Hermes Agent ──────────────────────────────────
        - name: hermes-agent
          image: sccsos-hermes:0.16.5
          imagePullPolicy: IfNotPresent
          # 保持运行，等待主容器通过 docker exec 调用
          command: ["sleep", "infinity"]
          env:
            - name: HERMES_HOME
              value: /hermes/home
            - name: HERMES_PROFILE
              value: sccsos
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sccsos-secrets
                  key: deepseek-api-key
                  optional: true
          volumeMounts:
            - name: hermes-home
              mountPath: /hermes/home
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

      volumes:
        - name: config
          configMap:
            name: sccsos-config
        - name: data
          persistentVolumeClaim:
            claimName: sccsos-data
        - name: logs
          persistentVolumeClaim:
            claimName: sccsos-logs
        - name: traces
          emptyDir: {}
        - name: agents
          configMap:
            name: sccsos-agents
            optional: true
        - name: workflows
          configMap:
            name: sccsos-workflows
            optional: true
        - name: personalities
          configMap:
            name: sccsos-personalities
            optional: true
        - name: wiki
          configMap:
            name: sccsos-wiki
            optional: true
        - name: dockersock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: hermes-home
          emptyDir: {}
