apiVersion: v1
kind: ConfigMap
metadata:
  name: sccsos-config
  namespace: sccsos
  labels:
    app.kubernetes.io/name: sccsos
data:
  sccsos.yaml: |
    project:
      name: sccsos
      version: "0.16.5"
    database:
      driver: sqlite
      path: /sccsos/data/sccsos.db
    logging:
      level: INFO
      format: json
      directory: /sccsos/logs
      retention_days: 30
    tracing:
      enabled: true
      export_path: /sccsos/traces/
    agents:
      path: /sccsos/agents
      wiki_path: /sccsos/wiki
      personalities_path: /sccsos/personalities
    policies:
      default:
        max_tokens_per_session: 100000
        max_cost_usd: 5.0
        allowed_tools:
          - read_file
          - search_files
          - web_search
          - web_extract
          - terminal
          - delegate_task
        blocked_tools: []
        allowed_commands:
          - hermes
          - git
          - ls
          - cat
          - head
          - tail
          - echo
          - python3
          - pip3
          - node
          - npm
          - which
    # Slim + Sidecar 模式：通过 docker-exec 与 sidecar 通信
    hermes:
      adapter: docker-exec
      docker:
        container: hermes-agent
        network: host
