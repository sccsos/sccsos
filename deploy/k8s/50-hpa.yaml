apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sccsos
  namespace: sccsos
  labels:
    app.kubernetes.io/name: sccsos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sccsos
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
