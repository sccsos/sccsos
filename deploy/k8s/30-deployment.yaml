apiVersion: apps/v1
kind: Deployment
metadata:
  name: sccsos
  namespace: sccsos
  labels:
    app.kubernetes.io/name: sccsos
    app.kubernetes.io/version: "0.11.4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sccsos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sccsos
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8765"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: sccsos
          image: sccsos:0.14.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8765
              protocol: TCP
              name: http-api
          env:
            - name: SCCSOS_CONFIG
              value: /sccsos/config/sccsos.yaml
          volumeMounts:
            - name: config
              mountPath: /sccsos/config
              readOnly: true
            - name: data
              mountPath: /sccsos/data
            - name: logs
              mountPath: /sccsos/logs
            - name: traces
              mountPath: /sccsos/traces
            - name: agents
              mountPath: /sccsos/agents
              readOnly: true
            - name: workflows
              mountPath: /sccsos/workflows
              readOnly: true
            - name: personalities
              mountPath: /sccsos/personalities
              readOnly: true
            - name: wiki
              mountPath: /sccsos/wiki
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http-api
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http-api
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: config
          configMap:
            name: sccsos-config
        - name: data
          persistentVolumeClaim:
            claimName: sccsos-data
        - name: logs
          persistentVolumeClaim:
            claimName: sccsos-logs
        - name: traces
          emptyDir: {}
        - name: agents
          configMap:
            name: sccsos-agents
            optional: true
        - name: workflows
          configMap:
            name: sccsos-workflows
            optional: true
        - name: personalities
          configMap:
            name: sccsos-personalities
            optional: true
        - name: wiki
          configMap:
            name: sccsos-wiki
            optional: true
