apiVersion: v1
kind: ConfigMap
metadata:
  name: sccsos-config
  namespace: sccsos
  labels:
    app.kubernetes.io/name: sccsos
data:
  sccsos.yaml: |
    project:
      name: sccsos
      version: "0.14.2"
    database:
      path: /sccsos/data/sccsos.db
    defaults:
      hermes_profile: sccsos
      max_turns: 90
      timeout: 1800
    logging:
      level: INFO
      format: json
      directory: /sccsos/logs
      retention_days: 30
    tracing:
      enabled: true
      export_path: /sccsos/traces/
    agents:
      path: /sccsos/agents
      wiki_path: /sccsos/wiki
      personalities_path: /sccsos/personalities
    policies:
      default:
        max_tokens_per_session: 100000
        max_cost_usd: 5.0
        allowed_tools:
          - read_file
          - search_files
          - web_search
          - web_extract
          - terminal
          - delegate_task
        blocked_tools: []
        allowed_commands:
          - hermes
          - git
          - ls
          - cat
          - head
          - tail
          - echo
          - python3
          - pip3
          - node
          - npm
          - which
