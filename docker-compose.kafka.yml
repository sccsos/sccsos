# SCCS OS — Kafka Event Bus Integration
#
# Extends docker-compose.yaml with Kafka + Zookeeper.
# Run with:
#   docker compose -f docker-compose.yaml -f docker-compose.kafka.yml up -d
#
# Then use in sccsos.yaml:
#   event_bus:
#     backend: kafka
#     bootstrap_servers: kafka:9092

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6
    container_name: sccsos-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: echo srvr | nc -q 2 localhost 2181 || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - sccsos-net

  kafka:
    image: confluentinc/cp-kafka:7.6
    container_name: sccsos-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: nc -z localhost 9092 || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sccsos-net

networks:
  sccsos-net:
    name: sccsos-network
